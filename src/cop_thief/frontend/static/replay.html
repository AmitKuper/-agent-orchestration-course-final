<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replay — Cop &amp; Thief</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
  h1,h2 { color: #1a237e; }
  nav a { margin-right: 1rem; color: #1565c0; text-decoration: none; }
  .controls { display: flex; gap: .5rem; align-items: center; margin: 1rem 0; flex-wrap: wrap; }
  button { padding: .4rem .9rem; border: none; border-radius: 4px; background: #1565c0; color: white; cursor: pointer; font-size: .85rem; }
  button:hover { background: #0d47a1; }
  button:disabled { background: #90a4ae; cursor: default; }
  #step-info { font-size: .9rem; color: #555; }
  .board { display: inline-grid; gap: 2px; margin: .5rem 0; }
  .cell { width: 36px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: #e8eaf6; border: 1px solid #c5cae9; }
  .cell.trail-cop    { background: #fff9c4; }
  .cell.trail-thief  { background: #fce4ec; }
  .cell.cop          { background: #1565c0; color: white; border-color: #0d47a1; }
  .cell.thief        { background: #c62828; color: white; border-color: #b71c1c; }
  .card { background: white; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.15); padding: 1rem 1.5rem; margin-bottom: 1rem; }
  .event-row { padding: .35rem 0; border-bottom: 1px solid #eee; font-size: .88rem; display: flex; gap: 1rem; }
  .actor-cop   { color: #1565c0; font-weight: 600; }
  .actor-thief { color: #c62828; font-weight: 600; }
  #events { max-height: 220px; overflow-y: auto; }
</style>
</head>
<body>
<h1>Sub-game Replay</h1>
<nav><a id="back-link" href="#">← Back to match</a></nav>
<hr>
<div id="loading">Loading replay data…</div>
<div id="main" style="display:none">
  <div class="controls">
    <button id="btn-first" onclick="seek(0)">⏮ First</button>
    <button id="btn-prev"  onclick="seek(step-1)">◀ Prev</button>
    <span id="step-info"></span>
    <button id="btn-next"  onclick="seek(step+1)">Next ▶</button>
    <button id="btn-last"  onclick="seek(events.length)">Last ⏭</button>
  </div>
  <div style="display:flex;gap:1.5rem;flex-wrap:wrap">
    <div>
      <h2 style="margin-top:0">Board</h2>
      <div id="board" class="board"></div>
    </div>
    <div style="flex:1;min-width:260px">
      <h2 style="margin-top:0">Events</h2>
      <div id="events" class="card"></div>
    </div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const matchId = params.get('match');
const sgIndex = params.get('sg');
document.getElementById('back-link').href = `/app/match.html?id=${matchId}`;

let events = [], step = 0, rows = 0, cols = 0;

async function init() {
  const r = await fetch(`/api/games/${matchId}/subgames/${sgIndex}`);
  if (!r.ok) { document.getElementById('loading').textContent = 'Sub-game not found.'; return; }
  const sg = await r.json();
  events = sg.events ?? [];
  if (sg.initial_state_json) {
    rows = sg.initial_state_json.grid_rows ?? 8;
    cols = sg.initial_state_json.grid_cols ?? 8;
  }
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = '';
  seek(0);
}

function seek(n) {
  step = Math.max(0, Math.min(n, events.length));
  renderBoard();
  renderEvents();
  renderControls();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${cols || 8}, 36px)`;
  board.innerHTML = '';
  const state = step === 0
    ? null
    : (events[step - 1]?.state_after_json ?? null);
  const initialState = events[0]?.state_before_json ?? null;
  const src = state ?? initialState;
  if (!src) {
    board.textContent = 'No board data.';
    return;
  }
  const r = src.grid_rows ?? rows ?? 8;
  const c = src.grid_cols ?? cols ?? 8;
  board.style.gridTemplateColumns = `repeat(${c}, 36px)`;
  const copPos  = src.cop_pos  ?? src.cop  ?? null;
  const thiefPos = src.thief_pos ?? src.thief ?? null;
  const copTrail   = new Set((src.cop_trail   ?? []).map(t => `${t[0]},${t[1]}`));
  const thiefTrail = new Set((src.thief_trail ?? []).map(t => `${t[0]},${t[1]}`));
  for (let row = 0; row < r; row++) {
    for (let col = 0; col < c; col++) {
      const cell = document.createElement('div');
      const key = `${row},${col}`;
      const isCop   = copPos   && copPos[0]   === row && copPos[1]   === col;
      const isThief = thiefPos && thiefPos[0] === row && thiefPos[1] === col;
      cell.className = 'cell' +
        (isCop   ? ' cop'   : isThief ? ' thief' :
         copTrail.has(key)  ? ' trail-cop'  :
         thiefTrail.has(key)? ' trail-thief' : '');
      cell.textContent = isCop ? '👮' : isThief ? '🦹' : '';
      board.appendChild(cell);
    }
  }
}

function renderEvents() {
  const el = document.getElementById('events');
  el.innerHTML = '';
  const visible = events.slice(0, step);
  if (!visible.length) { el.textContent = 'No events yet.'; return; }
  for (const ev of visible) {
    const div = document.createElement('div');
    div.className = 'event-row';
    const actor = `<span class="actor-${ev.actor_role}">${ev.actor_role}</span>`;
    const action = ev.action_json?.direction ?? ev.action_json?.type ?? '?';
    div.innerHTML = `<span>#${ev.turn_index}</span>${actor}<span>${action}</span><span>${ev.result}</span>`;
    el.appendChild(div);
  }
  el.scrollTop = el.scrollHeight;
}

function renderControls() {
  document.getElementById('step-info').textContent = `Step ${step} / ${events.length}`;
  document.getElementById('btn-first').disabled = step === 0;
  document.getElementById('btn-prev').disabled  = step === 0;
  document.getElementById('btn-next').disabled  = step === events.length;
  document.getElementById('btn-last').disabled  = step === events.length;
}

init();
</script>
</body>
</html>
